name: Sync Currently Reading

on:
  schedule:
    - cron: '0  3 * * *'   # 3:00 AM UTC
    - cron: '0  9 * * *'   # 9:00 AM UTC
    - cron: '0 15 * * *'   # 3:00 PM UTC
    - cron: '0 21 * * *'   # 9:00 PM UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch currently-reading shelf from Goodreads
        run: python3 sync_currently_reading.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/currentlyReading.json
          git diff --staged --quiet && echo "No change to commit." || \
            (git commit -m "Sync currently reading [automated]" && git push)
