name: Enrich Google Books Ratings

on:
  workflow_dispatch:   # Run manually from the Actions tab in GitHub

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit enriched data back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Google Books ratings
        run: python3 enrich_google_books.py
        timeout-minutes: 30

      - name: Commit enriched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "Nothing new to commit." || \
            git commit -m "Enrich Google Books ratings [automated]" && git push
