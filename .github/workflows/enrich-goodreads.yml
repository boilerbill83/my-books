name: Enrich from Goodreads (description fallback)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scrape descriptions from each book's Goodreads page
        run: python3 enrich_from_goodreads.py
        timeout-minutes: 15
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "Nothing recovered." || \
            (git commit -m "Enrich descriptions via Goodreads fallback [automated]" && git push)
