name: Scrape StoryGraph + Amazon Ratings

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC daily
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Books to process (default 25)'
        required: false
        default: '25'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape ratings
        run: |
          BATCH=${{ github.event.inputs.batch_size || '25' }}
          python3 scrape_ratings.py "$BATCH"
        timeout-minutes: 90

      - name: Commit updated ratings cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scrapedRatings.json
          git diff --staged --quiet && echo "No new ratings scraped." || \
            (git commit -m "Scrape ratings batch [automated]" && git push)
