name: Enrich Cover URLs

on:
  schedule:
    - cron: '0 5 * * 0'   # Sundays 5 AM UTC (after enrich-isbn at 4 AM)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backfill cover URLs via OpenLibrary + Google Books
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: python3 enrich_covers.py
        timeout-minutes: 45

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No new covers found." || \
            (git commit -m "Backfill cover URLs via OL + Google Books [automated]" && git push)
