name: Enrich ISBN13

on:
  schedule:
    - cron: '0 4 * * 0'   # Sundays 4 AM UTC (catches new books from weekly sync)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backfill ISBN13 via Google Books API
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: python3 enrich_isbn.py
        timeout-minutes: 30

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No new ISBNs found." || \
            (git commit -m "Backfill ISBN13 via Google Books [automated]" && git push)
