<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bill's Books</title>
    <meta name="description" content="Bill's personal reading recommendations powered by Goodreads" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ===== SLIM HEADER (status only) ===== -->
      <header class="site-header">
        <div class="container header-inner">
          <div class="header-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Loading…</span>
          </div>
        </div>
      </header>

      <!-- ===== MAIN CONTENT ===== -->
      <div class="container">

        <!-- Logo + Currently Reading (side-by-side) -->
        <section id="currentlyReadingSection">
          <div class="cr-top-layout">
            <div class="cr-logo-col">
              <img src="./PNG image.png" alt="Bill's Books" class="site-logo" />
            </div>
            <div class="cr-books-col">
              <h3 class="card-heading">📖 Currently Reading</h3>
              <div id="currentlyReadingGrid" class="cr-grid"></div>
            </div>
          </div>
        </section>

        <!-- Analytics tiles + rating donut -->
        <section class="analytics">
          <div id="analyticsTiles" class="tile-grid"></div>
          <div id="ratingDonut" class="donut-strip card"></div>
        </section>

        <!-- Reading insights -->
        <section class="insights-section">
          <div class="card">
            <h3 class="card-heading">📖 Reading Insights</h3>
            <ul id="insightsList" class="insights-list"></ul>
          </div>
        </section>

        <!-- On This Day (hidden until data is available) -->
        <section id="onThisDay" hidden></section>

        <!-- What Should I Read Next -->
        <section class="recommendations-section">
          <div class="section-header">
            <h3 class="card-heading">📚 What Should I Read Next?</h3>
            <div style="display:flex;gap:8px;align-items:center">
              <div class="view-toggle" id="viewToggle">
                <button class="view-toggle-btn active" data-view="cards">Cards</button>
                <button class="view-toggle-btn" data-view="list">List</button>
              </div>
              <button id="refreshButton" class="primary-button">Refresh ↻</button>
            </div>
          </div>
          <div class="filter-bar">
            <div class="filter-group">
              <span class="filter-label">Source</span>
              <label class="filter-check">
                <input type="checkbox" id="filterToRead" checked />
                <span>To-read list</span>
              </label>
              <label class="filter-check">
                <input type="checkbox" id="filterOnlineFinds" checked />
                <span>Candidate pool</span>
              </label>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-group">
              <span class="filter-label">Type</span>
              <label class="filter-check">
                <input type="checkbox" id="filterFiction" checked />
                <span>Fiction</span>
              </label>
              <label class="filter-check">
                <input type="checkbox" id="filterNonfiction" checked />
                <span>Nonfiction</span>
              </label>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-group">
              <span class="filter-label">Priority</span>
              <label class="filter-check">
                <input type="checkbox" id="filterTop10" />
                <span>⭐ Top-10 TBR only</span>
              </label>
            </div>
            <span class="pool-count" id="poolCount"></span>
          </div>
          <div id="themeFilterBar" class="theme-filter-bar"></div>
          <div id="toneFilterBar" class="tone-filter-bar"></div>
          <!-- decorative bookshelf bar -->
          <div id="bookshelfBar" class="bookshelf-bar" aria-hidden="true"></div>
          <div id="recommendationsGrid" class="recs-grid"></div>
        </section>

        <!-- Dismissed Books -->
        <section class="dismissed-section">
          <button class="dismissed-toggle" id="dismissedToggle" aria-expanded="false">
            <span>Dismissed books</span>
            <span class="dismissed-count" id="dismissedCount"></span>
            <span class="dismissed-chevron">▸</span>
          </button>
          <div class="dismissed-panel" id="dismissedPanel" hidden>
            <button class="undo-btn" id="copyFeedbackBtn" style="margin:10px 16px 2px;" title="Copy all interactions as JSON to commit into data/feedbackData.json">Copy feedback JSON</button>
            <div id="dismissedList" class="dismissed-list"></div>
          </div>
        </section>

      </div>
    </div>

    <!-- ===== DISMISS DIALOG ===== -->
    <dialog id="dismissDialog" class="dialog">
      <form id="dismissForm" method="dialog" class="dialog-body">
        <div class="dialog-header">
          <h3>Dismiss recommendation</h3>
          <button type="submit" aria-label="Close">✕</button>
        </div>
        <p id="dismissBookLabel" style="font-weight:600;font-family:var(--font-serif)"></p>
        <p class="dialog-copy">Why are you dismissing this one?</p>
        <div class="reason-list">
          <label><input type="radio" name="dismissReason" value="not_interesting" checked /> Doesn't look interesting</label>
          <label><input type="radio" name="dismissReason" value="topic_doesnt_appeal" /> Topic doesn't appeal to me</label>
          <label><input type="radio" name="dismissReason" value="not_my_vibe" /> Not my vibe</label>
          <label><input type="radio" name="dismissReason" value="started_did_not_like" /> Started it, didn't finish</label>
          <label><input type="radio" name="dismissReason" value="no_longer_relevant" /> No longer relevant</label>
          <label><input type="radio" name="dismissReason" value="already_seen_adaptation" /> Already saw the movie / show</label>
          <label><input type="radio" name="dismissReason" value="already_read_or_owned" /> Already read or own it</label>
          <label><input type="radio" name="dismissReason" value="dont_know_author" /> Don't know the author</label>
          <label><input type="radio" name="dismissReason" value="too_long" /> Too long for what it offers</label>
        </div>
        <div class="dialog-actions">
          <button class="primary-button" value="default" type="submit">Save dismissal</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
